name: Build Play Store AAB & Test APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Fresh Keystore
        run: |
          rm -f app/tmkey.jks
          keytool -genkeypair -v \
            -keystore app/tmkey.jks \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -storepass "আপনার_পাসওয়ার্ড" \
            -keypass "আপনার_পাসওয়ার্ড" \
            -dname "CN=Tamim, O=App, C=BD"

      - name: Build Release Bundle (AAB)
        run: gradle bundleRelease --stacktrace

      - name: Build Test APK
        run: gradle assembleRelease --stacktrace

      - name: Clean and Collect Files
        run: |
          mkdir -p output_files
          cp app/build/outputs/bundle/release/*.aab output_files/ 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk output_files/ 2>/dev/null || true

      - name: Upload Files to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-build-files
          path: output_files/
