name: Build Play Store AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Fresh Keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/tmkey.jks \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass tamim1234 \
            -keypass tamim1234 \
            -dname "CN=Tamim, O=App, C=BD"

      - name: Build Release Bundle (AAB)
        run: gradle bundleRelease --stacktrace

      - name: Upload Play Store AAB
        uses: actions/upload-artifact@v4
        with:
          name: play-store-bundle
          path: app/build/outputs/bundle/release/*.aab
