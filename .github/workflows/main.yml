name: Android CI

on:
  workflow_dispatch: # এর মাধ্যমে আপনি যখন ইচ্ছা তখন বাটনে চাপ দিয়ে অ্যাপ বিল্ড করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Change wrapper permissions
      run: chmod +x gradlew
      continue-on-error: true # যদি gradlew ফাইল না থাকে তাহলেও যেন বিল্ড আটকে না যায়

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: app/build/outputs/apk/debug/*.apk
