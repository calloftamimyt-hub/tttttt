name: Build Play Store AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Fresh Keystore
        run: |
          # যদি পুরনো কোনো tmkey.jks ফাইল থেকে থাকে, তা আগে ডিলিট করে দেওয়া হবে
          rm -f app/tmkey.jks
          
          # একদম ফ্রেশ JKS চাবি তৈরি করা হচ্ছে
          keytool -genkeypair -v \
            -keystore app/tmkey.jks \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -storepass CallOfTamim2345617859Tanjil@#yt@#67Tuli@# \
            -keypass CallOfTamim2345617859Tanjil@#yt@#67Tuli@# \
            -dname "CN=Tamim, O=App, C=BD"

      - name: Build Release Bundle (AAB)
        run: gradle bundleRelease --stacktrace

      - name: Upload Play Store AAB
        uses: actions/upload-artifact@v4
        with:
          name: play-store-bundle
          path: app/build/outputs/bundle/release/*.aab
